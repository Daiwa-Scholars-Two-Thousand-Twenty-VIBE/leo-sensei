name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  TZ: Asia/Tokyo

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, windows-2025, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run check
